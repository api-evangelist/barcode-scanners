aid: barcode-scanners
name: Barcode Scanners
description: >-
  Barcode scanning technology and APIs for scanning, generating, and looking up
  barcode data including UPC, EAN, ISBN, QR codes, and other barcode formats
  used in retail, logistics, and inventory management.
type: Index
image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
tags:
  - Barcodes
  - Inventory
  - Product Lookup
  - QR Codes
  - Retail
  - Scanning
url: >-
  https://raw.githubusercontent.com/api-evangelist/barcode-scanners/refs/heads/main/apis.yml
created: '2024-01-15'
modified: '2026-03-16'
specificationVersion: '0.19'
apis:
  - aid: barcode-scanners:barcode-lookup-api
    name: Barcode Lookup API
    description: >-
      Retrieve product information by scanning or entering barcode numbers
      including UPC, EAN, and ISBN codes.
    humanURL: https://www.barcodelookup.com/api
    baseURL: https://api.barcodelookup.com/v3
    tags:
      - Barcodes
      - EAN
      - Product Lookup
      - UPC
    properties:
      - type: Documentation
        url: https://www.barcodelookup.com/api
      - type: Authentication
        url: https://www.barcodelookup.com/api#authentication
  - aid: barcode-scanners:upcitemdb-api
    name: UPCitemdb API
    description: >-
      Free and commercial API for looking up product information using UPC,
      EAN, and other barcodes.
    humanURL: https://www.upcitemdb.com/
    baseURL: https://api.upcitemdb.com/prod/trial
    tags:
      - Barcodes
      - EAN
      - Product Data
      - UPC
    properties:
      - type: Documentation
        url: https://www.upcitemdb.com/api/docs
