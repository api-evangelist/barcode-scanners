- name: UPCitemdb API
  description: Free and commercial API for looking up product information using UPC, EAN, and other barcodes
  image: https://example.com/upcitemdb-logo.png
  humanUrl: https://www.upcitemdb.com
  baseUrl: https://api.upcitemdb.com/prod/trial
